<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Search Ideas - Pinterest | Find Inspiration for Every Occasion</title>
  <meta name="description" content="Search Pinterest for ideas across fashion, beauty, home decor, recipes, DIY and more. Explore millions of curated pins and save your favorites to mood boards. Find exactly what inspires you.">
  <meta name="keywords" content="Pinterest search, find ideas, inspiration, fashion ideas, beauty tips, home decor inspiration, recipes, DIY projects, search pins, mood boards, creative inspiration">
  <meta name="robots" content="index, follow">
  <meta name="author" content="Pinterest">
  <meta name="application-name" content="Pinterest">
  <meta name="theme-color" content="#e60023">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <link rel="canonical" href="https://www.pinterest.com/search/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <meta property="og:title" content="Search Ideas - Pinterest | Find Inspiration for Every Occasion">
  <meta property="og:description" content="Search Pinterest for ideas across fashion, beauty, home decor, recipes, DIY and more. Explore millions of curated pins and save your favorites.">
  <meta property="og:image" content="https://picsum.photos/seed/ogsearch/1200/630">
  <meta property="og:url" content="https://www.pinterest.com/search/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Pinterest">
  <meta property="og:locale" content="en_US">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Search Ideas - Pinterest | Find Inspiration for Every Occasion">
  <meta name="twitter:description" content="Search Pinterest for ideas across fashion, beauty, home decor, recipes, DIY and more. Explore millions of curated pins.">
  <meta name="twitter:image" content="https://picsum.photos/seed/ogsearch/1200/630">
</head>
<body>

  <!-- Primary Nav -->
  <nav class="primary-nav inner-page">
    <div class="nav-inner">
      <button class="hamburger" id="hamburgerBtn" aria-label="Menu">☰</button>
      <div class="nav-logo">
        <svg class="p-logo" viewBox="0 0 24 24" fill="#e60023"><path d="M12 0C5.372 0 0 5.372 0 12c0 5.084 3.163 9.426 7.627 11.174-.105-.949-.2-2.405.042-3.441.218-.936 1.407-5.965 1.407-5.965s-.359-.719-.359-1.782c0-1.668.967-2.914 2.171-2.914 1.024 0 1.518.769 1.518 1.69 0 1.029-.655 2.568-.994 3.995-.283 1.194.599 2.169 1.777 2.169 2.133 0 3.772-2.249 3.772-5.495 0-2.873-2.064-4.882-5.012-4.882-3.414 0-5.418 2.561-5.418 5.207 0 1.031.397 2.138.893 2.738a.36.36 0 01.083.345l-.333 1.36c-.053.22-.174.267-.402.161-1.499-.698-2.436-2.889-2.436-4.649 0-3.785 2.75-7.262 7.929-7.262 4.163 0 7.398 2.967 7.398 6.931 0 4.136-2.607 7.464-6.227 7.464-1.216 0-2.359-.632-2.75-1.38l-.748 2.853c-.271 1.043-1.002 2.35-1.492 3.146C9.57 23.812 10.763 24 12 24c6.628 0 12-5.372 12-12S18.628 0 12 0z"/></svg>
      </div>
      <div class="nav-search">
        <div class="search-bar" id="searchBar">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="bold lip" value="bold lip" id="searchInput">
          <button class="search-toggle" id="searchToggle" aria-label="Toggle search">🔍</button>
        </div>
      </div>
      <div class="nav-actions">
        <a href="#" id="loginBtn">Log in</a>
        <button class="btn btn-primary" id="signupBtn">Sign up</button>
      </div>
    </div>
  </nav>

  <!-- Filter Strip -->
  <div class="filter-strip">
    <button class="filter-chip active">All</button>
    <button class="filter-chip">Beauty makeup</button>
    <button class="filter-chip">Lipstick</button>
    <button class="filter-chip">Editorial makeup</button>
    <button class="filter-chip">Bold lips</button>
    <button class="filter-chip">Makeup looks</button>
    <button class="filter-chip">Lip gloss</button>
    <button class="filter-chip">Matte lip</button>
  </div>

  <!-- Pin Grid -->
  <section class="pin-grid" style="padding-top:var(--spacing-sm);">
    <div class="pin-card">
      <img src="https://picsum.photos/seed/search1/300/420" alt="Bold lip makeup look inspiration on Pinterest" class="pin-image" loading="lazy">
      <span class="pin-overlay-pill">Bold lip</span>
    </div>
    <div class="pin-card">
      <img src="https://picsum.photos/seed/search2/300/500" alt="Beauty makeup tips and tutorials on Pinterest" class="pin-image" loading="lazy">
      <span class="pin-overlay-pill">Beauty makeup</span>
    </div>
    <div class="pin-card">
      <img src="https://picsum.photos/seed/search3/300/380" alt="Lipstick shades and lip color ideas on Pinterest" class="pin-image" loading="lazy">
      <span class="pin-overlay-pill">Lipstick</span>
    </div>
    <div class="pin-card">
      <img src="https://picsum.photos/seed/search4/300/450" alt="Editorial makeup artist looks on Pinterest" class="pin-image" loading="lazy">
    </div>
    <div class="pin-card">
      <img src="https://picsum.photos/seed/search5/300/360" alt="Makeup trends and beauty inspiration on Pinterest" class="pin-image" loading="lazy">
    </div>
    <div class="pin-card">
      <img src="https://picsum.photos/seed/search6/300/480" alt="Lip gloss and glossy makeup ideas on Pinterest" class="pin-image" loading="lazy">
    </div>
    <div class="pin-card">
      <img src="https://picsum.photos/seed/search7/300/400" alt="Matte lip color inspiration on Pinterest" class="pin-image" loading="lazy">
    </div>
    <div class="pin-card">
      <img src="https://picsum.photos/seed/search8/300/440" alt="Makeup look of the day ideas on Pinterest" class="pin-image" loading="lazy">
    </div>
    <div class="pin-card">
      <img src="https://picsum.photos/seed/search9/300/370" alt="Natural makeup style inspiration on Pinterest" class="pin-image" loading="lazy">
    </div>
    <div class="pin-card">
      <img src="https://picsum.photos/seed/search10/300/490" alt="Evening makeup glam looks on Pinterest" class="pin-image" loading="lazy">
    </div>
    <div class="pin-card">
      <img src="https://picsum.photos/seed/search11/300/410" alt="Creative makeup art ideas on Pinterest" class="pin-image" loading="lazy">
    </div>
    <div class="pin-card">
      <img src="https://picsum.photos/seed/search12/300/430" alt="Creative makeup art ideas on Pinterest" class="pin-image" loading="lazy">
    </div>
  </section>

  <!-- Signup Modal -->
  <div class="modal-overlay" id="signupModal">
    <div class="modal-card" style="position:relative;">
      <button class="btn-icon-circular modal-close" id="modalClose" aria-label="Close">&times;</button>
      <h2 class="modal-title">Welcome to Pinterest</h2>
      <p class="modal-subtitle">Find new ideas to try</p>
      <div class="modal-fields">
        <input type="email" class="text-input" placeholder="Email" required>
        <input type="password" class="text-input" placeholder="Password" required>
        <input type="text" class="text-input" placeholder="Birthdate" required>
        <select class="text-input" required>
          <option value="">Country</option>
          <option value="US">United States</option>
          <option value="UK">United Kingdom</option>
          <option value="CA">Canada</option>
        </select>
      </div>
      <button class="btn btn-primary">Continue</button>
      <div class="modal-footer-link">
        <a href="#" class="link-inline">Already a member? Log in</a>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
